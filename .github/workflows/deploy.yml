name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Build
        env:
          VITE_SUPABASE_URL: "https://boxyaqqwqnocdtfyaijz.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVkNJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJveHlhcXF3cW5vY2R0ZnlhaWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDI1MDI1MDAsImV4cCI6MjA1ODA3ODUwMH0.UIEPRMaejPBGcrBBoGxSjVPSFJ7PH7pT9bQ3MBwb_QE"
          VITE_SUPABASE_PROJECT_ID: "boxyaqqwqnocdtfyaijz"
        run: bun run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
